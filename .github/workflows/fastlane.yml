name: Validate Fastlane metadata

on:
  workflow_dispatch:
  push:
      branches: [ "master" ]
      paths:
        - 'fastlane/**'
  pull_request:
      branches: [ "master" ]
      paths:
        - 'fastlane/**'

jobs:
  go:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - name: Validate Fastlane Supply Metadata
        uses: ashutoshgngwr/validate-fastlane-supply-metadata@v2
